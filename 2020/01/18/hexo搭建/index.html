<p>使用的cnpm安装</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">npm install -g cnpm --registry&#x3D;https:&#x2F;&#x2F;registry.npm.taobao.org</span><br><span class="line">cnpm install hexo-cli -g</span><br><span class="line">cnpm install hexo --save</span><br></pre></td></tr></table></figure>

<p>那么后面相关的插件也得要使用cnpm安装</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">cnpm install</span><br></pre></td></tr></table></figure>



<p>部署到github时</p>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="variable">$hexo</span> d<span class="comment">#不加-g</span></span><br></pre></td></tr></table></figure>

<p>部署的时候报错</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">Deployer not found: github 或者 Deployer not found: git</span><br></pre></td></tr></table></figure>

<p>原因时需要安装插件</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">npm install hexo-deployer-git --save</span><br></pre></td></tr></table></figure>

<p>而这里需要使用cnpm安装<a href="https://blog.csdn.net/qq_38868135/article/details/103832006" target="_blank" rel="noopener">参考</a></p>
<p>初始化报错：hexo 错误: 找不到或无法加载主类 install</p>
<p>重新generate了一下<a href="https://cloud.tencent.com/developer/article/1482893" target="_blank" rel="noopener">参考</a></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">cnpm install</span><br><span class="line">hexo g</span><br><span class="line">hexo s</span><br></pre></td></tr></table></figure>



<p>Hexo 博客本地预览报错：Error: listen EADDRINUSE 0.0.0.0:4000</p>
<p><a href="https://blog.csdn.net/qq_36759224/article/details/92443159" target="_blank" rel="noopener">参考</a></p>
